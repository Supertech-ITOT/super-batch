<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;

        }

        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: block;
        }

        .banner {
            position: relative;
            width: 100%;
            height: 100%;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
        }

        .progress-bar {
            position: absolute;
            bottom: 10;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 9999;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #008029;
            animation: fill 2.4s ease-in-out forwards;
        }

        @keyframes fill {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="banner">
        <img src="./logo.png" alt="Super Batch Splash" draggable="false" />
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>
</body>

</html>
